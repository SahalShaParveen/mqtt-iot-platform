<html>

<head>
    <title>EnvMonitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>

<body>
    <div id="dashboard"> </div>


    <button onclick="setPeriod('1h')">Last Hour</button>
    <button onclick="setPeriod('24h')">Last 24h</button>
    <button onclick="setPeriod('7d')">Week</button>

    <label>Device:</label>
    <select id="deviceSelect" onchange="deviceChanged()"></select>

    <label>Metric:</label>
    <select id="metricSelect" onchange="metricChanged()"></select>

    <canvas id="tempChart"></canvas>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
